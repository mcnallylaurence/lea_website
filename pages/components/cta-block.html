<!-- ═══════════════════════════════════════════════
     REUSABLE CTA BLOCK &mdash; Ladybird Ever After
     Drop this into any page as a standalone code block.
     Root class: .lb-cta
     Customise the headline/sub via data attributes or
     simply edit the text before injecting.
═══════════════════════════════════════════════ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Alice&display=swap" rel="stylesheet">

<style>
.lb-cta {
  --green:    #5B6239;
  --green-dk: #3a3f25;
  --green-hv: #4a5130;
  --gold:     #B8964E;
  --gold-lt:  #D4AF71;
  --cream:    #F5F0E8;
  --warm:     #FDFAF4;
  --stone:    #8C8070;
  --txt:      #1A1A18;
  --txt-mid:  #4A4A42;
  --pad-x: clamp(1.2rem, 5vw, 5rem);
  font-family: 'Alice', serif;
  font-weight: 300;
  -webkit-text-size-adjust: 100%;
}
.lb-cta *, .lb-cta *::before, .lb-cta *::after { margin:0; padding:0; box-sizing:border-box; }

/* ── CTA BAND ── */
.lb-cta .cta-band {
  background: var(--green-dk);
  padding: clamp(3rem, 6vw, 5rem) var(--pad-x);
  text-align: center;
}

.lb-cta .cta-inner {
  max-width: 560px; margin: 0 auto;
}

.lb-cta .cta-overline {
  display: inline-flex; align-items: center; gap: .7rem;
  font-size: .58rem; letter-spacing: .32em; text-transform: uppercase;
  color: var(--gold-lt); font-weight: 600; margin-bottom: 1.4rem;
}
.lb-cta .cta-overline::before,
.lb-cta .cta-overline::after {
  content: ''; flex: 0 0 22px; height: 1px; background: var(--gold-lt); opacity: .45;
}

.lb-cta .cta-band h2 {
  font-family: 'Playfair Display', serif; font-weight: 300;
  font-size: clamp(2rem, 4vw, 3rem);
  color: var(--warm); line-height: 1.15; margin-bottom: 1rem;
}
.lb-cta .cta-band h2 em { font-style: italic; color: var(--gold-lt); }

.lb-cta .cta-sub {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: clamp(.88rem, 1.5vw, 1.05rem);
  color: rgba(245,240,232,.55); line-height: 1.72;
  margin-bottom: 2.2rem;
}

.lb-cta .cta-divider {
  width: 40px; height: 1px; background: var(--gold-lt); opacity: .35;
  margin: 0 auto 2.2rem;
}

.lb-cta .btn-gold {
  display: inline-block; font-family: 'Alice', serif;
  font-size: .78rem; font-weight: 600; letter-spacing: .16em;
  text-transform: uppercase; text-decoration: none;
  padding: 1.1rem 3rem; background: var(--gold); color: var(--green);
  border: 2px solid var(--gold); transition: all .3s; cursor: pointer;
}
.lb-cta .btn-gold:hover {
  background: transparent; color: var(--gold-lt); border-color: var(--gold-lt);
}

.lb-cta .cta-reassure {
  margin-top: 1.2rem;
  font-size: .68rem; color: rgba(245,240,232,.4); letter-spacing: .06em;
}

.lb-cta .cta-email {
  margin-top: .6rem;
  font-size: .68rem; color: rgba(245,240,232,.35);
}
.lb-cta .cta-email a {
  color: rgba(212,175,113,.5); text-decoration: underline;
  text-underline-offset: 3px; transition: color .3s;
}
.lb-cta .cta-email a:hover { color: var(--gold-lt); }
</style>

<div class="lb-cta">
  <div class="cta-band">
    <div class="cta-inner">
      <p class="cta-overline">Ready to Begin</p>
      <h2>Your date <em>won't wait.</em></h2>
      <div class="cta-divider"></div>
      <p class="cta-sub">Ireland's most sought-after venues book months in advance. Tell us your vision and we'll take it from there.</p>
      <a href="/get-in-touch" class="btn-gold">Book My Free Call &rarr;</a>
      <p class="cta-reassure">No commitment. No payment. Just a conversation.</p>
      <p class="cta-email">Or email us at <a href="mailto:info@ladybirdeverafter.com">info@ladybirdeverafter.com</a></p>
    </div>
  </div>
</div>
